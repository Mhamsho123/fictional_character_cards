<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>Mogimon</title>
  </head>
  <body>
    <div class="heading-container">
      <div class="title-container">
        <h1>Mogimon</h1>
        <h3>Got to mog'em all !</h3>
      </div>
      <ul class="header-selections">
        <li>Stats</li>
        <li>About</li>
        <li>Contact</li>
      </ul>
    </div>

    <section class="hero-container">
      <form>
        <div class="form-container">
          <div class="form-inner">
            <div class="form-name">
              <input
                id="first-name"
                type="text"
                placeholder="First Name"
                name="firstname"
                required
              />

              <input
                id="last-name"
                type="text"
                placeholder="Last Name"
                name="lastname"
                required
              />
            </div>

            <div class="form-row">
              <input id="birthday" type="date" name="DOB" required />
            </div>

            <div class="gender-row">
              <label for="gender-selection-male">Male</label>
              <input
                id="gender-selection-male"
                type="radio"
                name="gender"
                required
              />

              <label for="gender-selection-female">Female</label>
              <input
                id="gender-selection-female"
                type="radio"
                name="gender"
                required
              />
            </div>
            <div>
              <button id="submit-form" class="submit-form">Submit</button>
            </div>
          </div>
        </div>
      </form>
    </section>

    <script src="index.js" type="module"></script>
  </body>
</html>
